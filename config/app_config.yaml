workspace_dir: "./workspace"
output_dir: "./output"
reports_dir: "./output/reports"
generated_tests_dir: "./output/generated_tests"
min_line_coverage: 80.0
min_branch_coverage: 80.0
max_retry_rounds: 3
maven_test_cmd: "mvn -q clean test"
maven_jacoco_cmd: "mvn -q jacoco:report"
qwen:
  api_base: "https://your-qwen-endpoint/v1"
  model: "qwen-max"
  timeout_seconds: 90
  temperature: 0.2
  max_tokens: 2048
